<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe FrontEnd Mentor Accessibility Challenge 7</title>
    <link rel="icon" type="image/png" sizes="32x32" href="assets/images/favicon-32x32.png">
    <meta name="author" content="Philippe Tschanun">
    <meta name="description" content="Tic Tac Toe">
    <meta name="keywords" content="frontend: htlm, css, js">
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="assets/js/script.js" defer></script>
</head>

<body>
    <main>

        <!-------------------------- New Game Section -------------------------->
        
        <section id="new-start-menu" aria-hidden="false">
            <div>
                <img src="assets/images/icon-x.svg" alt="">
                <img src="assets/images/icon-o.svg" alt=""> 
            </div>
            <div>
                <p class="preset4">PICK PLAYER 1’S MARK</p>
                <div class="toggle-btn">
                    <button class="toggle-x">
                        <svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
                            <path d="M15.002 1.147 32 18.145 48.998 1.147a3 3 0 0 1 4.243 0l9.612 9.612a3 3 0 0 1 0 4.243L45.855 32l16.998 16.998a3 3 0 0 1 0 4.243l-9.612 9.612a3 3 0 0 1-4.243 0L32 45.855 15.002 62.853a3 3 0 0 1-4.243 0L1.147 53.24a3 3 0 0 1 0-4.243L18.145 32 1.147 15.002a3 3 0 0 1 0-4.243l9.612-9.612a3 3 0 0 1 4.243 0Z" fill="#A8BFC9">
                        </svg>
                    </button>
                    <button class="toggle-o">
                        <svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
                            <path d="M32 0c17.673 0 32 14.327 32 32 0 17.673-14.327 32-32 32C14.327 64 0 49.673 0 32 0 14.327 14.327 0 32 0Zm0 18.963c-7.2 0-13.037 5.837-13.037 13.037 0 7.2 5.837 13.037 13.037 13.037 7.2 0 13.037-5.837 13.037-13.037 0-7.2-5.837-13.037-13.037-13.037Z" fill="#000000"/>
                        </svg>
                    </button>
                </div>
                <p class="preset4">REMEMBER : X GOES FIRST</p>
            </div>
            <button class="btn1 preset3">
                NEW GAME (VS CPU)
            </button>
            <button class="btn2 preset3">
                NEW GAME  (VS PLAYER)
            </button>
        </section>

        <!-------------------------- Game Section -------------------------->

        <section id="game" aria-hidden="true">
            <!-- top row -->
            <div class="top-row">
                <div>
                    <img src="assets/images/icon-x.svg" alt="">
                    <img src="assets/images/icon-o.svg" alt=""> 
                </div>
                <div>
                    <svg width="15" height="15" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
                        <path d="M15.002 1.147 32 18.145 48.998 1.147a3 3 0 0 1 4.243 0l9.612 9.612a3 3 0 0 1 0 4.243L45.855 32l16.998 16.998a3 3 0 0 1 0 4.243l-9.612 9.612a3 3 0 0 1-4.243 0L32 45.855 15.002 62.853a3 3 0 0 1-4.243 0L1.147 53.24a3 3 0 0 1 0-4.243L18.145 32 1.147 15.002a3 3 0 0 1 0-4.243l9.612-9.612a3 3 0 0 1 4.243 0Z" fill="#A8BFC9" fill-rule="evenodd"/>
                    </svg>
                    <p class="preset4">TURN</p>
                </div>
                <button>
                    <svg width="15" height="15" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
                        <path d="M19.524 0h-1.88a.476.476 0 0 0-.476.499l.159 3.284A9.81 9.81 0 0 0 9.835.317C4.415.317-.004 4.743 0 10.167.004 15.597 4.406 20 9.835 20a9.796 9.796 0 0 0 6.59-2.536.476.476 0 0 0 .019-.692l-1.348-1.349a.476.476 0 0 0-.65-.022 6.976 6.976 0 0 1-9.85-.63 6.987 6.987 0 0 1 .63-9.857 6.976 6.976 0 0 1 10.403 1.348l-4.027-.193a.476.476 0 0 0-.498.476v1.881c0 .263.213.476.476.476h7.944A.476.476 0 0 0 20 8.426V.476A.476.476 0 0 0 19.524 0Z" fill="#1F3641"/>
                    </svg>
                </button>
            </div>
            <!-- tic-tac-toe -->
            <div class="tic-tac-toe">
                <button class="tic-btn space1"></button>
                <button class="tic-btn  space2"></button>
                <button class="tic-btn  space3"></button>
                <button class="tic-btn  space4"></button>
                <button class="tic-btn  space5"></button>
                <button class="tic-btn  space6"></button>
                <button class="tic-btn  space7"></button>
                <button class="tic-btn  space8"></button>
                <button class="tic-btn  space9"></button>
            </div>
            <!-- bottom row | score -->
            <div class="bottom-row">
                <div>
                    <p class="preset5-bold">X (YOU)</p>
                    <p class="you preset2">0</p>
                </div>
                <div>                
                    <p class="preset5-bold">TIES</p>
                    <p class="ties preset2">0</p>
                </div>
                <div>
                    <p class="preset5-bold">O (CPU)</p>
                    <p class="cpu preset2">0</p>
                </div>
            </div>
        </section>
    </main>

    <!-------------------------- Results & Replay Section (Lightbox) -------------------------->
    
    <section class="lightbox-wrapper" aria-hidden="true">
        <div class="lightbox-line">
            <div class="lightbox-content">
                <p class="preset4">YOU WON</p>
                <div>
                    <img src="assets/images/icon-x.svg" alt="">
                    <p class="preset1teal400">TAKE THE ROUND</p>
                </div>
                <div>
                    <button class="preset4slate900 grey-btn">QUIT</button>
                    <button class="preset4slate900 yellow-btn">NEXT ROUND</button>
                </div>
            </div>
        </div>
    </section>
</body>
